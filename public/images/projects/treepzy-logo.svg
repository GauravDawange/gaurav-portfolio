<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <linearGradient id="car" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Road -->
  <rect x="0" y="310" width="512" height="80" rx="0" fill="#065f46" opacity="0.4"/>
  <rect x="40" y="344" width="60" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="140" y="344" width="60" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="240" y="344" width="60" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="340" y="344" width="60" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  <rect x="440" y="344" width="40" height="6" rx="3" fill="#ffffff" opacity="0.4"/>
  <!-- Car body -->
  <rect x="140" y="270" width="220" height="70" rx="16" fill="url(#car)"/>
  <rect x="180" y="240" width="140" height="50" rx="14" fill="url(#car)" opacity="0.9"/>
  <!-- Windows -->
  <rect x="195" y="250" width="50" height="30" rx="6" fill="#059669" opacity="0.5"/>
  <rect x="255" y="250" width="50" height="30" rx="6" fill="#059669" opacity="0.5"/>
  <!-- Headlight -->
  <circle cx="348" cy="298" r="10" fill="#fbbf24"/>
  <!-- Tail light -->
  <circle cx="152" cy="298" r="8" fill="#ef4444" opacity="0.8"/>
  <!-- Wheels -->
  <circle cx="195" cy="340" r="24" fill="#1e293b"/>
  <circle cx="195" cy="340" r="10" fill="#64748b"/>
  <circle cx="305" cy="340" r="24" fill="#1e293b"/>
  <circle cx="305" cy="340" r="10" fill="#64748b"/>
  <!-- Location pin -->
  <g transform="translate(380, 120)">
    <path d="M20 0C8.95 0 0 8.95 0 20c0 15 20 36 20 36s20-21 20-36C40 8.95 31.05 0 20 0z" fill="#ffffff"/>
    <circle cx="20" cy="20" r="8" fill="#059669"/>
  </g>
  <!-- Signal waves from pin -->
  <path d="M390 110 Q395 100 405 105" stroke="#ffffff" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M385 100 Q393 86 410 95" stroke="#ffffff" stroke-width="2" fill="none" opacity="0.35"/>
  <!-- Text: T -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="72" fill="#ffffff" letter-spacing="-2">Treepzy</text>
</svg>

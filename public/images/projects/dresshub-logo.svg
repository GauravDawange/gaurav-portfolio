<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- Shopping bag -->
  <rect x="156" y="190" width="200" height="200" rx="20" fill="#ffffff" opacity="0.95"/>
  <rect x="156" y="190" width="200" height="60" rx="20" fill="#ffffff"/>
  <!-- Bag handle -->
  <path d="M216 190 V160 Q216 120 256 120 Q296 120 296 160 V190" stroke="#ea580c" stroke-width="14" fill="none" stroke-linecap="round"/>
  <!-- Hanger inside bag -->
  <g transform="translate(256, 300)" opacity="0.7">
    <line x1="0" y1="-40" x2="0" y2="-25" stroke="#ea580c" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="-44" r="8" stroke="#ea580c" stroke-width="4" fill="none"/>
    <path d="M-40 -25 L0 -10 L40 -25" stroke="#ea580c" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dress silhouette -->
    <path d="M-30 -20 L-40 40 Q-40 50 -30 50 L30 50 Q40 50 40 40 L30 -20" fill="#ea580c" opacity="0.15"/>
  </g>
  <!-- Star/sparkle -->
  <g transform="translate(380, 160)">
    <path d="M0 -16 L4 -4 L16 0 L4 4 L0 16 L-4 4 L-16 0 L-4 -4 Z" fill="#ffffff" opacity="0.8"/>
  </g>
  <g transform="translate(140, 150)">
    <path d="M0 -10 L3 -3 L10 0 L3 3 L0 10 L-3 3 L-10 0 L-3 -3 Z" fill="#ffffff" opacity="0.5"/>
  </g>
  <!-- Text -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="68" fill="#ffffff" letter-spacing="-2">DressHub</text>
</svg>
